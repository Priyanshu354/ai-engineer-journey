spring:
  application:
    name: Smart_CLI_Q-A-Bot


  ai:
    openai:
      api-key: ${OPEN_ROUTER_API_KEY}
      base-url: https://openrouter.ai/api

      chat:
        options:
#          model: google/gemini-3-flash-preview
          model: google/gemini-2.5-flash-lite
          temperature: 0.0
          max-tokens: 1000

logging:
  level:
    org.springframework.ai: DEBUG